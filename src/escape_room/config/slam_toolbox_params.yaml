slam_toolbox:
  ros__parameters:
    # Solver
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Frame names — must match robomaster_ros output
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # Mapping mode (online, building map from scratch each run)
    mode: mapping

    # Update triggers
    map_update_interval: 0.5          # seconds between /map publishes
    minimum_travel_distance: 0.05     # metres before new scan processed
    minimum_travel_heading: 0.05      # radians before new scan processed

    # Grid resolution (5 cm per cell — finer than old 10 cm mapper)
    resolution: 0.05
    max_laser_range: 5.0

    # Scan matching
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_time_interval: 0.05

    # Loop closure disabled — room is small enough that odometry drift
    # over one exploration pass is negligible; loop closure only causes
    # a large map-frame jump that corrupts the Nav2 costmap.
    loop_search_maximum_distance: 3.0
    do_loop_closing: false
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_covariance: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # Correlation
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Loop search
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # Misc
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: false
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    position_covariance_scale: 1.0
    yaw_covariance_scale: 1.0
